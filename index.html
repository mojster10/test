<!DOCTYPE html>
<html>
<head>
<title>Flying Bird</title>

<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:skyblue;
    font-family:Arial;
}

canvas {
    border:3px solid black;
    background:linear-gradient(skyblue,white);
}

#menu {
    position:absolute;
    text-align:center;
}

h1 {
    font-size:50px;
    color:white;
    text-shadow:3px 3px black;
}

button {
    font-size:25px;
    padding:15px 40px;
    border-radius:15px;
    border:none;
    cursor:pointer;
    background:orange;
}

button:hover {
    background:gold;
}
</style>

</head>

<body>


<div id="menu">
    <h1>🐦 Flying Bird</h1>
    <button onclick="startGame()">START GAME</button>
</div>


<canvas id="game" width="400" height="600"></canvas>


<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const menu=document.getElementById("menu");


let bird;
let pipes;
let score;
let gameOver;
let playing=false;


function resetGame(){

bird={
    x:80,
    y:300,
    size:25,
    gravity:0.5,
    jump:-8,
    speed:0
};

pipes=[];
score=0;
gameOver=false;

}


function startGame(){

menu.style.display="none";

resetGame();

playing=true;

update();

}


// skok
document.addEventListener("keydown",e=>{

if(e.code==="Space" && playing){

bird.speed=bird.jump;

}

});


canvas.onclick=function(){

if(playing)
bird.speed=bird.jump;

};


// nove cevi
function createPipe(){

if(!playing)return;

let gap=160;

let height=Math.random()*250+50;


pipes.push({

x:400,
top:height,
bottom:height+gap,
width:60

});

}


setInterval(createPipe,1500);



// ptič
function drawBird(){

ctx.fillStyle="yellow";

ctx.beginPath();

ctx.arc(
bird.x,
bird.y,
bird.size,
0,
Math.PI*2
);

ctx.fill();


ctx.fillStyle="black";

ctx.beginPath();

ctx.arc(
bird.x+8,
bird.y-8,
5,
0,
Math.PI*2
);

ctx.fill();

}



// cevi
function drawPipes(){

ctx.fillStyle="green";

pipes.forEach(p=>{

ctx.fillRect(
p.x,
0,
p.width,
p.top
);


ctx.fillRect(
p.x,
p.bottom,
p.width,
600
);


});

}



// igra
function update(){

if(!playing)return;


ctx.clearRect(
0,
0,
400,
600
);


// gravitacija

bird.speed+=bird.gravity;

bird.y+=bird.speed;



pipes.forEach(p=>{

p.x-=3;


// trk

if(
bird.x+bird.size>p.x &&
bird.x-bird.size<p.x+p.width &&
(
bird.y-bird.size<p.top ||
bird.y+bird.size>p.bottom
)

){

gameOver=true;

}


});



// meja

if(
bird.y>600 ||
bird.y<0
)

gameOver=true;



drawPipes();
drawBird();



// score

ctx.fillStyle="black";
ctx.font="25px Arial";

ctx.fillText(
"Score: "+score,
20,
40
);



if(gameOver){

ctx.fillStyle="red";
ctx.font="40px Arial";

ctx.fillText(
"GAME OVER",
70,
300
);


ctx.font="20px Arial";

ctx.fillText(
"Klikni START za novo igro",
60,
350
);


playing=false;

menu.style.display="block";

return;

}


requestAnimationFrame(update);

}

</script>

</body>
</html>

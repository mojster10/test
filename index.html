<!DOCTYPE html>
<html>
<head>
<title>Flying Bird</title>

<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:skyblue;
    font-family:Arial;
}

canvas {
    border:3px solid black;
    background:linear-gradient(skyblue, white);
}

#menu {
    position:absolute;
    text-align:center;
}

h1 {
    font-size:50px;
    color:white;
    text-shadow:3px 3px black;
}

button {
    font-size:25px;
    padding:15px 40px;
    border-radius:15px;
    border:none;
    cursor:pointer;
    background:orange;
}

button:hover {
    background:gold;
}
</style>

</head>

<body>


<div id="menu">
    <h1>🐦 Flying Bird</h1>
    <button onclick="startGame()">START GAME</button>
</div>


<canvas id="game" width="400" height="600"></canvas>



<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const menu = document.getElementById("menu");


let bird;
let pipes;
let score;
let playing;
let gameOver;



function resetGame(){

    bird = {
        x:80,
        y:300,
        size:25,
        gravity:0.5,
        jump:-8,
        speed:0
    };


    pipes=[];
    score=0;
    gameOver=false;
}



function startGame(){

    menu.style.display="none";

    resetGame();

    playing=true;

    update();
}



// skok
document.addEventListener("keydown", function(e){

    if(e.code==="Space" && playing){

        bird.speed=bird.jump;

    }

});


canvas.onclick=function(){

    if(playing){

        bird.speed=bird.jump;

    }

};



// ustvarjanje cevi
function createPipe(){

    if(!playing)return;


    let gap=160;

    let height=Math.random()*250+50;


    pipes.push({

        x:400,
        top:height,
        bottom:height+gap,
        width:60,
        passed:false

    });

}


setInterval(createPipe,1500);



// risanje ptiča
function drawBird(){

    ctx.fillStyle="yellow";

    ctx.beginPath();

    ctx.arc(
        bird.x,
        bird.y,
        bird.size,
        0,
        Math.PI*2
    );

    ctx.fill();


    // oko

    ctx.fillStyle="black";

    ctx.beginPath();

    ctx.arc(
        bird.x+8,
        bird.y-8,
        5,
        0,
        Math.PI*2
    );

    ctx.fill();

}



// risanje cevi
function drawPipes(){

    ctx.fillStyle="green";


    pipes.forEach(p=>{


        ctx.fillRect(
            p.x,
            0,
            p.width,
            p.top
        );


        ctx.fillRect(
            p.x,
            p.bottom,
            p.width,
            600
        );


    });

}



// glavna igra
function update(){


    if(!playing)return;


    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );



    // fizika ptiča

    bird.speed += bird.gravity;

    bird.y += bird.speed;



    // cevi

    pipes.forEach(p=>{


        p.x -= 3;



        // SCORE

        if(!p.passed && p.x + p.width < bird.x){

            score++;

            p.passed=true;

        }



        // trk

        if(

            bird.x + bird.size > p.x &&

            bird.x - bird.size < p.x+p.width &&

            (

            bird.y-bird.size < p.top ||

            bird.y+bird.size > p.bottom

            )

        ){

            gameOver=true;

        }



    });



    // nebo in tla

    if(
        bird.y < 0 ||
        bird.y > canvas.height
    ){

        gameOver=true;

    }



    drawPipes();

    drawBird();



    // rezultat

    ctx.fillStyle="black";

    ctx.font="25px Arial";

    ctx.fillText(
        "Score: "+score,
        20,
        40
    );



    if(gameOver){


        playing=false;


        ctx.fillStyle="red";

        ctx.font="40px Arial";

        ctx.fillText(
            "GAME OVER",
            70,
            300
        );


        ctx.font="20px Arial";

        ctx.fillText(
            "Klikni START za novo igro",
            55,
            350
        );


        menu.style.display="block";


        return;

    }



    requestAnimationFrame(update);

}


</script>


</body>
</html>

<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moja prva stran</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }
        .kartica {
            background: rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        .gumb {
            background: white;
            color: #764ba2;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s;
            margin-top: 20px;
        }
        .gumb:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="kartica">
        <h1>🚀 Živjo, svet!</h1>
        <p>To je moja prva stran na GitHubu in Vercelu.</p>
        <button class="gumb" onclick="alert('Hvala za klik! 🎉')">Klikni me</button>
    </div>
</body>
</html>
